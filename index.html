<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuotteen vahvistus</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif; max-width: 600px; margin: 0 auto; padding: 40px 20px; background-color: #fafafa; }
        .container { background: white; padding: 40px; border-radius: 20px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #374151; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; }
        .readonly { background: #f3f4f6; color: #6b7280; }
        button { width: 100%; padding: 16px; background: #000; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        /* Gallerian uudet, isommat koot */
        .kuva-galleria { display: flex; gap: 15px; overflow-x: auto; margin-bottom: 30px; padding-bottom: 10px; }
        .kuva-laatikko { flex: 0 0 220px; height: 220px; border-radius: 12px; overflow: hidden; background: #eee; cursor: pointer; border: 1px solid #ddd; }
        .kuva-laatikko img { width: 100%; height: 100%; object-fit: cover; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tuotteen vahvistus</h1>
    <div class="kuva-galleria" id="kuvaGalleria"></div>
    
    <form id="vahvistusForm" action="LISÄÄ_TÄHÄN_MAKE_WEBHOOK_URL" method="POST">
        <input type="hidden" name="token" value="MinunSalainenAvain123">
        <div class="form-group"><label>Tunnus</label><input type="text" name="tunnus" id="tunnus" readonly class="readonly"></div>
        <div class="form-group"><label>Nimi</label><input type="text" name="nimi" id="nimi"></div>
        <div class="form-group"><label>Hinta (€)</label><input type="number" name="hinta" id="hinta" step="0.01"></div>
        <button type="submit">Lähetä vahvistus</button>
    </form>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const fields = ['tunnus', 'nimi', 'tuotemerkki', 'kuvaus', 'perustelu', 'kunto', 'paaryhma', 'ryhma'];
    const fields = ['tunnus', 'nimi', 'tuotemerkki', 'kuvaus', 'hinta', 'perustelu', 'kunto', 'paaryhma', 'ryhma'];

    // Täytetään kentät
    // Täytetään kentät URL-parametreilla
    fields.forEach(f => {
        if(urlParams.get(f)) document.getElementById(f).value = urlParams.get(f);
        if(urlParams.get(f)) {
            const el = document.getElementById(f);
            if(f === 'hinta') {
                el.value = parseFloat(urlParams.get(f)).toFixed(2);
            } else {
                el.value = urlParams.get(f);
            }
        }
    });

    // Korjattu kuvagalleria: Pakotettu target="_blank"
    const kuvaParam = urlParams.get('kuva');
    if (kuvaParam) {
        const galleria = document.getElementById('kuvaGalleria');
        kuvaParam.split(',').forEach(url => {
            const trimmedUrl = url.trim();
            const a = document.createElement('a');
            a.href = trimmedUrl;
            a.target = "_blank"; // Avaa uuteen välilehteen
            a.innerHTML = `<div class="kuva-laatikko"><img src="${trimmedUrl}"></div>`;
            galleria.appendChild(a);
        });
    }

    // Lähetys
    document.getElementById('vahvistusForm').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch(this.action, { method: 'POST', body: new FormData(this) })
        .then(() => {
            document.querySelector('.container').innerHTML = `
                <h1 style="text-align:center">✅ Lähetetty!</h1>
                <button onclick="window.close()" style="background:#000;">Sulje välilehti</button>
                <button onclick="window.location.href='https://docs.google.com/spreadsheets/d/LISÄÄ_ID'" style="background:#fff; color:#000; border:1px solid #000; margin-top:10px;">Palaa listaan</button>
            `;
        });
    });
</script>
</body>
</html>

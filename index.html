<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuotteen vahvistus</title>
    <style>
        :root {
            --primary-color: #000;
            --text-primary: #374151;
            --text-secondary: #6b7280;
            --border-color: #d1d5db;
            --border-light: #e5e7eb;
            --bg-light: #f3f4f6;
            --bg-page: #fafafa;
            --bg-white: #fff;
            --radius-sm: 8px;
            --radius-lg: 12px;
            --radius-xl: 20px;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --gap-sm: 6px;
            --gap-md: 15px;
            --gap-lg: 20px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: var(--bg-page);
        }

        .container {
            background: var(--bg-white);
            padding: 40px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 25px 0;
            color: var(--text-primary);
        }

        .helper-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: var(--gap-sm);
            font-weight: 400;
        }

        .form-group {
            margin-bottom: var(--gap-lg);
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: var(--gap-sm);
            font-size: 14px;
            color: var(--text-primary);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s, background-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        input.readonly, textarea.readonly {
            background-color: var(--bg-light);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .gallery {
            display: flex;
            gap: var(--gap-md);
            overflow-x: auto;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        .gallery-item {
            flex: 0 0 220px;
            height: 220px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--bg-light);
            cursor: pointer;
            border: 1px solid var(--border-light);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .gallery-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            opacity: 0.9;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: var(--bg-white);
            margin-top: 10px;
        }

        .btn-secondary {
            background-color: var(--bg-white);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .confirmation-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--gap-md);
            margin-top: 10px;
        }

        .confirmation-buttons button {
            margin-top: 0;
        }

        .confirmation-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        #confirmationPanel {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tuotteen vahvistus</h1>
        <div class="gallery" id="gallery"></div>

        <form id="form">
            <input type="hidden" name="token" value="MinunSalainenAvain123">

            <div class="form-group">
                <label for="tunnus">Tunnus</label>
                <input type="text" id="tunnus" name="tunnus" readonly class="readonly">
            </div>

            <div class="form-group">
                <label for="nimi">Nimi</label>
                <input type="text" id="nimi" name="nimi">
            </div>

            <div class="form-group">
                <label for="tuotemerkki">Tuotemerkki</label>
                <input type="text" id="tuotemerkki" name="tuotemerkki">
            </div>

            <div class="form-group">
                <label for="kuvaus">Kuvaus</label>
                <textarea id="kuvaus" name="kuvaus" rows="5"></textarea>
            </div>

            <div class="form-group">
                <label for="kunto">Kunto</label>
                <select id="kunto" name="kunto" required>
                    <option value="">Valitse kunto...</option>
                    <option value="Erinomainen">Erinomainen</option>
                    <option value="Hyvä">Hyvä</option>
                    <option value="Tyydyttävä">Tyydyttävä</option>
                </select>
                <div class="helper-text">Hintaehdotus muuttuu valitun kunnon perusteella</div>
            </div>

            <div class="form-group">
                <label for="hinta">Hinta (€)</label>
                <input type="number" id="hinta" name="hinta" step="0.01">
            </div>

            <div class="form-group">
                <label for="perustelu">Perustelu</label>
                <textarea id="perustelu" name="perustelu" rows="2" readonly class="readonly"></textarea>
            </div>

            <div class="form-group">
                <label for="paaryhma">Pääryhmä</label>
                <input type="text" id="paaryhma" name="paaryhma">
            </div>

            <div class="form-group">
                <label for="ryhma">Ryhmä</label>
                <input type="text" id="ryhma" name="ryhma">
            </div>

            <button type="submit" class="btn-primary">Tallenna</button>
        </form>

        <div id="confirmationPanel"></div>
    </div>

    <script>
        const CONFIG = {
            webhookUrl: 'https://hook.eu1.make.com/asoke6dexf84uhjhear67bjhsj48m5r9',
            formFields: ['tunnus', 'nimi', 'tuotemerkki', 'kuvaus', 'hinta', 'perustelu', 'kunto', 'paaryhma', 'ryhma'],
            conditionMultipliers: {
                'Erinomainen': 1.15,
                'Hyvä': 1.00,
                'Tyydyttävä': 0.75
            }
        };

        const form = document.getElementById('form');
        const gallery = document.getElementById('gallery');
        const confirmationPanel = document.getElementById('confirmationPanel');
        const kuntoSelect = document.getElementById('kunto');
        const hintaInput = document.getElementById('hinta');
        const submitBtn = form.querySelector('button[type="submit"]');

        let basePrice = null; // Geminin antama hinta (kunto: Hyvä)
        let lastSubmission = null;

        function getConditionMultiplier(condition) {
            return CONFIG.conditionMultipliers[condition] ?? 1.00;
        }

        function formatPrice(value) {
            return (Math.round(value * 2) / 2).toFixed(2);
        }

        function populateFormFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);

            CONFIG.formFields.forEach(fieldName => {
                const value = urlParams.get(fieldName);
                if (!value) return;

                const element = document.getElementById(fieldName);
                if (!element) return;

                if (fieldName === 'hinta') {
                    const price = parseFloat(value) || 0;
                    element.value = price.toFixed(2);
                    basePrice = price; // Tallennetaan alkuperäinen hinta pohjaksi
                } else {
                    element.value = value;
                }
            });

            const kuvaParam = urlParams.get('kuva');
            if (kuvaParam) populateGallery(kuvaParam);
        }

        // --- TÄMÄ LOGIIKKA VARMISTAA, ETTÄ HINTA PÄIVITTYY OIKEIN ---
        kuntoSelect.addEventListener('change', (e) => {
            if (basePrice === null) basePrice = parseFloat(hintaInput.value) || 0;
            const multiplier = getConditionMultiplier(e.target.value);
            hintaInput.value = formatPrice(basePrice * multiplier);
        });

        hintaInput.addEventListener('input', () => {
            const manualPrice = parseFloat(hintaInput.value);
            if (!Number.isNaN(manualPrice)) {
                const currentMultiplier = getConditionMultiplier(kuntoSelect.value);
                basePrice = manualPrice / currentMultiplier;
            }
        });

        function populateGallery(kuvaParam) {
            kuvaParam.split(',').forEach(url => {
                const trimmedUrl = url.trim();
                if (!trimmedUrl) return;

                const link = document.createElement('a');
                link.href = trimmedUrl;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';

                const img = document.createElement('img');
                img.src = trimmedUrl;
                img.alt = 'Tuotekuva';

                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.appendChild(img);

                link.appendChild(item);
                gallery.appendChild(link);
            });
        }

        function sendToWebhook(formData) {
            const dataObj = {};
            for (const [key, value] of formData.entries()) {
                dataObj[key] = value;
            }

            return fetch(CONFIG.webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataObj)
            });
        }

        function showConfirmationPanel() {
            form.style.display = 'none';
            confirmationPanel.innerHTML = `
                <div class="confirmation-icon">✅</div>
                <h1>Tallennettu!</h1>
                <div class="confirmation-buttons">
                    <button id="confirmCloseBtn" class="btn-primary">Vahvista ja sulje</button>
                    <button id="editBackBtn" class="btn-secondary">Palaa muokkaamaan</button>
                </div>
            `;
            confirmationPanel.style.display = 'block';

            document.getElementById('editBackBtn').addEventListener('click', hideConfirmationPanel);
            document.getElementById('confirmCloseBtn').addEventListener('click', closeWindow);
        }

        function hideConfirmationPanel() {
            confirmationPanel.style.display = 'none';
            form.style.display = 'block';
        }

        function closeWindow() {
            if (lastSubmission) {
                const params = new URLSearchParams(lastSubmission);
                sendToWebhook(params)
                    .catch(() => {})
                    .finally(() => window.close());
            } else {
                window.close();
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!kuntoSelect.value) {
                alert('Valitse kunto ennen lähettämistä.');
                kuntoSelect.focus();
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'Tallennetaan...';

            const formData = new FormData(form);
            lastSubmission = Object.fromEntries(formData);

            try {
                await sendToWebhook(formData);
                showConfirmationPanel();
            } catch (error) {
                console.error('Submission error:', error);
                alert('Virhe lähetyksessä. Tarkista yhteys ja yritä uudelleen.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Tallenna';
            }
        });

        populateFormFromUrl();
    </script>
</body>
</html>
